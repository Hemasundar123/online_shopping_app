name: github-actions-ci
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  IMAGE_NAME: ${{vars.DOCKER_USERNAME}}/shopping
  IMAGE_TAG: ${{ github.sha }}

jobs:
    login:
        runs-on: ubuntu-latest
        steps:
            - name: Check out the repository
              uses: actions/checkout@v4

            - name: Login to DockerHub
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD}}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Run a one-line script
              run: echo "Logging in to DockerHub"

            - name: Verify Docker Login
              run: docker info

            - name: Build and push Docker image
              uses: docker/build-push-action@v3
              with:
                context: .
                file: ./Dockerfile
                push: ${{ github.ref == 'refs/heads/master' }}
                tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
                cache-from: type=gha
                cache-to: type=gha,mode=max

            - name: Image build summary
              run: echo "Docker image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} built and pushed successfully."

            - name: Kubernetes Deploy Image
              run: |
                echo "Docker image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} is ready for deployment."
                sed -i "s|image: .*|image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|g" k8s/deployment.yml

            - name: show deployment file
              run: cat k8s/deployment.yml

            - name: commit to GitHub
              run: |
                git config --global user.name "github-actions"
                git config --global user.email "jagilinkihemasundar333@gmail.com"
                git add k8s/deployment.yml
                git commit -m "Update deployment image to ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
                git push origin master
            


