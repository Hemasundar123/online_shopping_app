
apiVersion: argoproj.io/v1alpha1  
kind: Application                  
metadata:
  name: online-shop-app            
  namespace: argocd                
spec:
  project: default              
  source:
    repoURL: https://github.com/Hemasundar123/online_shopping_app.git
    targetRevision: master           
    path: k8s
  destination:
    server: https://172.17.0.1:33893
    namespace: default            
  syncPolicy:                      
    automated:                  
      prune: true                  
      selfHeal: true                
      
